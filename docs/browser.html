<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据浏览器 · AI Token 研究</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
    --border: #2a2d3a; --accent: #7c6af7; --accent2: #38bdf8;
    --text: #e2e8f0; --muted: #94a3b8; --green: #34d399;
    --orange: #fb923c; --red: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system,'Segoe UI',sans-serif; min-height: 100vh; }
  a { color: var(--accent2); text-decoration: none; }
  a:hover { text-decoration: underline; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .logo { font-weight: 700; font-size: 1rem; white-space: nowrap; }
  .logo a { color: var(--text); }
  .search-wrap { flex: 1; min-width: 200px; }
  input[type=search] { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; color: var(--text); font-size: 0.9rem; outline: none; }
  input[type=search]:focus { border-color: var(--accent); }
  select { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 0.85rem; cursor: pointer; }

  .layout { display: flex; height: calc(100vh - 57px); }
  .sidebar { width: 200px; flex-shrink: 0; border-right: 1px solid var(--border); padding: 16px 12px; overflow-y: auto; }
  .sidebar h4 { font-size: 0.72rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 8px; margin-top: 16px; }
  .sidebar h4:first-child { margin-top: 0; }
  .filter-btn { display: flex; justify-content: space-between; align-items: center; width: 100%; background: none; border: none; color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 0.83rem; cursor: pointer; text-align: left; }
  .filter-btn:hover, .filter-btn.active { background: var(--surface2); }
  .filter-btn.active { color: var(--accent); font-weight: 600; }
  .filter-count { font-size: 0.75rem; color: var(--muted); }

  .main { flex: 1; overflow-y: auto; padding: 16px; }
  .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .count-label { font-size: 0.85rem; color: var(--muted); }

  .items { display: flex; flex-direction: column; gap: 10px; }
  .item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; cursor: pointer; transition: border-color .12s; }
  .item:hover { border-color: var(--accent); }
  .item-head { display: flex; align-items: flex-start; gap: 10px; }
  .item-score { font-size: 0.75rem; color: var(--muted); white-space: nowrap; flex-shrink: 0; padding-top: 2px; }
  .item-score span { color: var(--orange); font-weight: 600; }
  .item-title { font-size: 0.9rem; font-weight: 500; line-height: 1.4; flex: 1; }
  .item-meta { margin-top: 6px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .tag { font-size: 0.72rem; padding: 2px 8px; border-radius: 20px; background: var(--surface2); color: var(--muted); }
  .tag.platform-reddit { background: #1a0a00; color: #fb923c; }
  .tag.platform-hackernews { background: #1a0f00; color: #fb923c; }
  .tag.platform-zhihu { background: #00081a; color: #60a5fa; }
  .tag.platform-bilibili { background: #0a001a; color: #c084fc; }
  .tag.platform-youtube { background: #1a0000; color: #f87171; }
  .tag.platform-github_discussions { background: #001a0a; color: #34d399; }
  .tag.platform-x_nitter,.tag.platform-x { background: #111; color: #94a3b8; }
  .tag.task-coding { background: #0d1a2e; color: var(--accent2); }
  .tag.task-agent { background: #1a0d2e; color: #a78bfa; }
  .tag.task-rag { background: #0d2e1a; color: var(--green); }
  .tag.lang-zh { background: #1a1000; color: #fbbf24; }
  .cost-tag { font-size: 0.72rem; color: var(--red); }
  .item-body { margin-top: 10px; font-size: 0.82rem; color: var(--muted); line-height: 1.5; display: none; border-top: 1px solid var(--border); padding-top: 10px; }
  .item-body.open { display: block; }
  .item-link { display: inline-block; margin-top: 8px; font-size: 0.8rem; }

  .pagination { display: flex; gap: 8px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
  .page-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-size: 0.82rem; }
  .page-btn:hover { border-color: var(--accent); }
  .page-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .page-btn:disabled { opacity: 0.4; cursor: default; }

  .loading { text-align: center; padding: 60px; color: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="logo"><a href="index.html">← AI Token 研究</a> &nbsp;/&nbsp; 数据浏览器</div>
  <div class="search-wrap">
    <input type="search" id="search" placeholder="搜索标题、正文……" oninput="onSearch()">
  </div>
  <select id="sortSel" onchange="render()">
    <option value="score">按热度排序</option>
    <option value="cost">按费用排序</option>
  </select>
</header>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="loading">加载中…</div>
  </div>
  <div class="main">
    <div class="toolbar">
      <span class="count-label" id="countLabel"></span>
    </div>
    <div id="items" class="items"><div class="loading">加载数据中…</div></div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<script>
let allData = [];
let filtered = [];
let page = 1;
const PAGE_SIZE = 30;
let filterPlatform = '';
let filterTask = '';
let filterLang = '';
let searchQ = '';

async function init() {
  const r = await fetch('data.json');
  allData = await r.json();
  buildSidebar();
  applyFilter();
}

function buildSidebar() {
  const platforms = {};
  const tasks = {};
  const langs = {};
  for (const d of allData) {
    platforms[d.platform] = (platforms[d.platform]||0)+1;
    if (d.task) tasks[d.task] = (tasks[d.task]||0)+1;
    langs[d.lang] = (langs[d.lang]||0)+1;
  }
  const sorted = (obj) => Object.entries(obj).sort((a,b)=>b[1]-a[1]);
  let html = `<h4>平台</h4>`;
  html += btn('全部', '', 'platform', allData.length);
  for (const [k,v] of sorted(platforms)) html += btn(k, k, 'platform', v);
  html += `<h4>任务类型</h4>`;
  html += btn('全部', '', 'task', '');
  for (const [k,v] of sorted(tasks)) html += btn(k||'其他', k, 'task', v);
  html += `<h4>语言</h4>`;
  html += btn('全部', '', 'lang', '');
  for (const [k,v] of sorted(langs)) html += btn(k==='zh'?'中文':'English', k, 'lang', v);
  document.getElementById('sidebar').innerHTML = html;
}

function btn(label, val, type, count) {
  const active = (type==='platform'&&filterPlatform===val)||(type==='task'&&filterTask===val)||(type==='lang'&&filterLang===val);
  return `<button class="filter-btn${active?' active':''}" onclick="setFilter('${type}','${val}')">${label}<span class="filter-count">${count||''}</span></button>`;
}

function setFilter(type, val) {
  if (type==='platform') filterPlatform=val;
  else if (type==='task') filterTask=val;
  else filterLang=val;
  page=1;
  buildSidebar();
  applyFilter();
}

let searchTimer;
function onSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(()=>{
    searchQ = document.getElementById('search').value.toLowerCase();
    page = 1;
    applyFilter();
  }, 200);
}

function applyFilter() {
  filtered = allData.filter(d => {
    if (filterPlatform && d.platform !== filterPlatform) return false;
    if (filterTask && d.task !== filterTask) return false;
    if (filterLang && d.lang !== filterLang) return false;
    if (searchQ) {
      const txt = (d.title+' '+d.body).toLowerCase();
      if (!txt.includes(searchQ)) return false;
    }
    return true;
  });
  const sort = document.getElementById('sortSel').value;
  if (sort==='cost') filtered.sort((a,b)=>(parseFloat(b.cost)||0)-(parseFloat(a.cost)||0));
  else filtered.sort((a,b)=>b.score-a.score);
  document.getElementById('countLabel').textContent = `共 ${filtered.length} 条`;
  render();
}

function render() {
  const start = (page-1)*PAGE_SIZE;
  const slice = filtered.slice(start, start+PAGE_SIZE);
  const taskColors = {coding:'task-coding',agent:'task-agent',rag:'task-rag'};

  const html = slice.map(d => {
    const costStr = d.cost && parseFloat(d.cost)>0 ? `<span class="cost-tag">💰 $${parseFloat(d.cost).toLocaleString()}</span>` : '';
    const taskTag = d.task ? `<span class="tag ${taskColors[d.task]||''}">${d.task}</span>` : '';
    const langTag = d.lang==='zh' ? `<span class="tag lang-zh">中文</span>` : '';
    return `<div class="item" onclick="toggleBody(this)">
      <div class="item-head">
        <div class="item-score">▲<span>${d.score.toLocaleString()}</span></div>
        <div class="item-title">${esc(d.title)}</div>
      </div>
      <div class="item-meta">
        <span class="tag platform-${d.platform}">${d.platform}</span>
        ${taskTag}${langTag}${costStr}
      </div>
      <div class="item-body">
        <p>${esc(d.body)}</p>
        <a class="item-link" href="${esc(d.url)}" target="_blank" rel="noopener">→ 原文链接</a>
      </div>
    </div>`;
  }).join('');

  document.getElementById('items').innerHTML = html || '<div class="loading">没有匹配结果</div>';

  // pagination
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  let pages = '';
  pages += `<button class="page-btn" onclick="goPage(${page-1})" ${page<=1?'disabled':''}>‹ 上一页</button>`;
  const start2 = Math.max(1, page-2), end2 = Math.min(total, page+2);
  if (start2>1) pages += `<button class="page-btn" onclick="goPage(1)">1</button>${start2>2?'<span style="color:var(--muted)">…</span>':''}`;
  for (let i=start2;i<=end2;i++) pages += `<button class="page-btn${i===page?' active':''}" onclick="goPage(${i})">${i}</button>`;
  if (end2<total) pages += `${end2<total-1?'<span style="color:var(--muted)">…</span>':''}<button class="page-btn" onclick="goPage(${total})">${total}</button>`;
  pages += `<button class="page-btn" onclick="goPage(${page+1})" ${page>=total?'disabled':''}>下一页 ›</button>`;
  document.getElementById('pagination').innerHTML = total>1?pages:'';
}

function goPage(p) {
  page = p;
  render();
  document.querySelector('.main').scrollTo(0,0);
}

function toggleBody(el) {
  el.querySelector('.item-body').classList.toggle('open');
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
