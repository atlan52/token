<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Token 消耗研究</title>
<style>
:root {
  --bg:#0f1117;--card:#1a1d27;--border:#2a2d3e;
  --accent:#7c6af7;--accent2:#56cfb2;
  --text:#e2e8f0;--muted:#8892a4;
  --burn:#f97316;--green:#4ade80;--yellow:#facc15;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font:14px/1.6 system-ui,sans-serif;min-height:100vh;}
a{color:var(--accent2);text-decoration:none;}
a:hover{text-decoration:underline;}

.sidebar{position:fixed;top:0;left:0;bottom:0;width:220px;background:var(--card);border-right:1px solid var(--border);padding:16px;overflow-y:auto;z-index:10;}
.main{margin-left:220px;padding:20px;max-width:1200px;}
.logo{font-size:15px;font-weight:700;color:var(--accent);margin-bottom:20px;}
.nav-section{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:16px 0 6px;}
.nav-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;border:none;border-radius:6px;background:transparent;color:var(--text);cursor:pointer;font-size:13px;text-align:left;transition:background .15s;}
.nav-btn:hover{background:#ffffff12;}
.nav-btn.active{background:#7c6af720;color:var(--accent);}
.badge{margin-left:auto;background:#ffffff18;color:var(--muted);font-size:11px;padding:1px 6px;border-radius:10px;}
.nav-btn.active .badge{background:var(--accent);color:#fff;}

.stats-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;flex:1;min-width:120px;}
.stat-card .val{font-size:22px;font-weight:700;color:var(--accent);}
.stat-card .lbl{font-size:11px;color:var(--muted);margin-top:2px;}

.filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.filter-row input,.filter-row select{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 12px;font-size:13px;outline:none;}
.filter-row input{flex:1;min-width:180px;}
.filter-row input:focus,.filter-row select:focus{border-color:var(--accent);}

.result-meta{font-size:12px;color:var(--muted);margin-bottom:12px;}
.item-list{display:flex;flex-direction:column;gap:10px;}
.item-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;transition:border-color .15s;}
.item-card:hover{border-color:var(--accent);}
.item-header{display:flex;align-items:flex-start;gap:10px;}
.item-platform{font-size:11px;color:var(--muted);white-space:nowrap;margin-top:1px;}
.item-title{font-size:14px;font-weight:600;flex:1;line-height:1.4;}
.item-title a{color:var(--text);}
.item-title a:hover{color:var(--accent);}
.item-meta{display:flex;gap:10px;margin-top:8px;font-size:12px;color:var(--muted);flex-wrap:wrap;align-items:center;}
.item-body{font-size:13px;color:#9ba5b7;margin-top:8px;line-height:1.5;}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;}
.tag-task{background:#7c6af720;color:var(--accent);}
.tag-lang{background:#56cfb220;color:var(--accent2);}
.tag-burn{background:#f9731620;color:var(--burn);}
.score{color:var(--yellow);}
.item-detail{margin-top:12px;border-top:1px solid var(--border);padding-top:12px;display:none;}
.item-detail.open{display:block;}
.item-detail pre{white-space:pre-wrap;word-break:break-word;font-size:12px;color:#9ba5b7;max-height:400px;overflow-y:auto;}
.comment{background:#ffffff06;border-radius:6px;padding:8px 10px;margin-top:6px;font-size:12px;color:#8892a4;}
.btn-ghost{padding:4px 10px;font-size:11px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;cursor:pointer;}
.btn-ghost:hover{border-color:var(--accent);color:var(--text);}

.pagination{display:flex;gap:6px;margin-top:20px;justify-content:center;flex-wrap:wrap;}
.page-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;font-size:13px;}
.page-btn:hover{border-color:var(--accent);color:var(--text);}
.page-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.page-btn:disabled{opacity:.4;cursor:default;}

.view{display:none;}
.view.active{display:block;}
.section-title{font-size:16px;font-weight:700;margin-bottom:16px;}
.chart-bar{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:12px;}
.bar-fill{height:14px;border-radius:4px;background:var(--accent);min-width:4px;}
.bar-label{min-width:140px;color:var(--muted);}
.bar-count{color:var(--text);font-weight:600;}

.report-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:24px;line-height:1.8;}
.report-wrap h1{font-size:22px;color:var(--accent);margin-bottom:16px;}
.report-wrap h2{font-size:17px;color:var(--accent2);margin:20px 0 10px;border-bottom:1px solid var(--border);padding-bottom:6px;}
.report-wrap h3{font-size:14px;color:var(--text);margin:14px 0 6px;}
.report-wrap p{margin:8px 0;color:#9ba5b7;}
.report-wrap table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px;}
.report-wrap th{text-align:left;padding:8px 12px;background:#ffffff0a;color:var(--muted);font-weight:600;}
.report-wrap td{padding:7px 12px;border-top:1px solid var(--border);color:#9ba5b7;}
.report-wrap a{color:var(--accent);}
.report-wrap code{background:#ffffff12;padding:1px 5px;border-radius:4px;font-size:12px;}
.report-wrap blockquote{border-left:3px solid var(--accent);padding-left:14px;color:var(--accent2);font-style:italic;margin:12px 0;}
.report-wrap ul,.report-wrap ol{padding-left:20px;color:#9ba5b7;}
.report-wrap li{margin:4px 0;}
.report-wrap hr{border:none;border-top:1px solid var(--border);margin:20px 0;}
.report-wrap pre{background:#111827;border-radius:6px;padding:12px;font-size:12px;overflow-x:auto;color:#9ba5b7;margin:10px 0;}
.report-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.report-tab{padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;font-size:13px;}
.report-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}

.loading{text-align:center;padding:60px;color:var(--muted);}

@media(max-width:700px){
  .sidebar{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:4px;padding:10px;}
  .main{margin-left:0;padding:12px;}
  .logo{width:100%;}
  .nav-section{display:none;}
  .nav-btn{width:auto;}
}
</style>
</head>
<body>

<nav class="sidebar">
  <div class="logo">🔥 Token 消耗研究</div>
  <div class="nav-section">视图</div>
  <button class="nav-btn active" id="nav-browse" onclick="showView('browse',this)">📋 全部数据 <span class="badge" id="total-badge">…</span></button>
  <button class="nav-btn" id="nav-charts" onclick="showView('charts',this)">📈 统计图表</button>
  <button class="nav-btn" id="nav-report" onclick="showView('report',this)">📊 研究报告</button>
  <div class="nav-section">平台筛选</div>
  <div id="platform-nav"></div>
</nav>

<div class="main">

  <div class="view active" id="view-browse">
    <div class="stats-bar">
      <div class="stat-card"><div class="val" id="s-total">…</div><div class="lbl">总条数</div></div>
      <div class="stat-card"><div class="val" id="s-platforms">12</div><div class="lbl">平台</div></div>
      <div class="stat-card"><div class="val" id="s-cost">…</div><div class="lbl">提及成本条目</div></div>
      <div class="stat-card"><div class="val" id="s-en">…</div><div class="lbl">英文 / 中文</div></div>
    </div>
    <div class="filter-row">
      <input type="search" id="q" placeholder="搜索标题 / 内容…（支持多关键词）" oninput="debouncedFilter()">
      <select id="f-platform" onchange="applyFilter()">
        <option value="">所有平台</option>
      </select>
      <select id="f-lang" onchange="applyFilter()">
        <option value="">中 / 英</option>
        <option value="en">English</option>
        <option value="zh">中文</option>
      </select>
      <select id="f-task" onchange="applyFilter()">
        <option value="">所有任务</option>
        <option value="coding">coding</option>
        <option value="agent">agent</option>
        <option value="rag">rag</option>
        <option value="chat">chat</option>
        <option value="writing">writing</option>
        <option value="translation">translation</option>
        <option value="other">other</option>
      </select>
      <select id="f-cost" onchange="applyFilter()">
        <option value="">任意成本</option>
        <option value="1">💰 有成本记录</option>
        <option value="100">💰 ≥ $100</option>
        <option value="1000">💰 ≥ $1,000</option>
      </select>
      <select id="f-sort" onchange="applyFilter()">
        <option value="score">↓ 热度</option>
        <option value="cost">↓ 金额</option>
      </select>
    </div>
    <div class="result-meta" id="result-meta"></div>
    <div class="item-list" id="item-list"><div class="loading">加载数据中（约 11MB，首次稍慢）…</div></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <div class="view" id="view-charts">
    <div class="section-title">平台分布</div><div id="chart-platform"></div>
    <div class="section-title" style="margin-top:28px">任务分类</div><div id="chart-task"></div>
    <div class="section-title" style="margin-top:28px">语言分布</div><div id="chart-lang"></div>
  </div>

  <div class="view" id="view-report">
    <div class="report-tabs">
      <button class="report-tab active" onclick="loadReport('burn.md',this)">🔥 烧 Token 分析</button>
      <button class="report-tab" onclick="loadReport('usecases.md',this)">💻 用途分布</button>
      <button class="report-tab" onclick="loadReport('productivity.md',this)">⚡ 效率翻倍</button>
      <button class="report-tab" onclick="loadReport('report.md',this)">📊 总览报告</button>
    </div>
    <div class="report-wrap" id="report-content"><div class="loading">点击上方标签查看报告</div></div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script>
const PLATFORMS = {
  hackernews:'🟠 Hacker News', zhihu:'🔵 知乎', bilibili:'🩵 B站',
  github_discussions:'⚫ GitHub', reddit:'🔴 Reddit', youtube:'▶️ YouTube',
  weibo:'🟡 微博', x_nitter:'🐦 X/Twitter', google_web:'🔍 Google',
  medium:'🟢 Medium', devto:'💻 Dev.to', substack:'📧 Substack',
};
const PAGE_SIZE = 30;

let allData = [];
let filtered = [];
let page = 1;
let debTimer = null;

async function init() {
  const r = await fetch('data.json');
  allData = await r.json();
  buildPlatformNav();
  buildStats();
  applyFilter();
}

function buildPlatformNav() {
  const counts = {};
  for (const d of allData) counts[d.p] = (counts[d.p]||0)+1;

  // populate select
  const sel = document.getElementById('f-platform');
  for (const [k,v] of Object.entries(PLATFORMS)) {
    if (!counts[k]) continue;
    const o = document.createElement('option');
    o.value = k; o.textContent = v + ' (' + (counts[k]||0) + ')';
    sel.appendChild(o);
  }

  // sidebar buttons
  let html = '<button class="nav-btn active" id="pnav-all" onclick="setPlatform(\'\',this)">全部 <span class="badge">' + allData.length.toLocaleString() + '</span></button>';
  for (const [k,label] of Object.entries(PLATFORMS)) {
    const c = counts[k] || 0;
    if (!c) continue;
    html += `<button class="nav-btn" id="pnav-${k}" onclick="setPlatform('${k}',this)">${label} <span class="badge">${c.toLocaleString()}</span></button>`;
  }
  document.getElementById('platform-nav').innerHTML = html;
}

function buildStats() {
  const total = allData.length;
  const costCount = allData.filter(d => d.c && parseFloat(d.c) > 0).length;
  const en = allData.filter(d => d.l === 'en').length;
  const zh = allData.filter(d => d.l === 'zh').length;
  document.getElementById('s-total').textContent = total.toLocaleString();
  document.getElementById('total-badge').textContent = total.toLocaleString();
  document.getElementById('s-cost').textContent = costCount.toLocaleString();
  document.getElementById('s-en').textContent = en.toLocaleString() + ' / ' + zh.toLocaleString();
}

function setPlatform(p, btn) {
  document.getElementById('f-platform').value = p;
  document.querySelectorAll('#platform-nav .nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pnav-'+(p||'all'))?.classList.add('active');
  showView('browse', document.getElementById('nav-browse'));
  page = 1;
  applyFilter();
}

function debouncedFilter() {
  clearTimeout(debTimer);
  debTimer = setTimeout(() => { page=1; applyFilter(); }, 220);
}

function applyFilter() {
  const q = document.getElementById('q').value.trim().toLowerCase();
  const terms = q ? q.split(/\s+/) : [];
  const platform = document.getElementById('f-platform').value;
  const lang = document.getElementById('f-lang').value;
  const task = document.getElementById('f-task').value;
  const costMin = parseFloat(document.getElementById('f-cost').value) || 0;
  const sort = document.getElementById('f-sort').value;

  filtered = allData.filter(d => {
    if (platform && d.p !== platform) return false;
    if (lang && d.l !== lang) return false;
    if (task && d.k !== task) return false;
    if (costMin > 0) {
      const c = parseFloat(d.c) || 0;
      if (c < costMin) return false;
    }
    if (terms.length) {
      const hay = (d.t + ' ' + d.b).toLowerCase();
      if (!terms.every(t => hay.includes(t))) return false;
    }
    return true;
  });

  if (sort === 'cost') {
    filtered.sort((a,b) => (parseFloat(b.c)||0) - (parseFloat(a.c)||0));
  }
  // default already sorted by score from data.json

  render();
}

function render() {
  const total = filtered.length;
  const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  page = Math.min(page, pages);
  const start = (page-1)*PAGE_SIZE;
  const slice = filtered.slice(start, start+PAGE_SIZE);

  document.getElementById('result-meta').textContent =
    `共 ${total.toLocaleString()} 条 · 第 ${page}/${pages} 页`;

  document.getElementById('item-list').innerHTML =
    slice.length ? slice.map(renderCard).join('') : '<div class="loading">没有匹配结果</div>';

  renderPagination(pages);
}

function renderCard(d) {
  const taskTag = d.k ? `<span class="tag tag-task">${d.k}</span>` : '';
  const langTag = d.l ? `<span class="tag tag-lang">${d.l}</span>` : '';
  const cost = parseFloat(d.c)||0;
  const costTag = cost > 0 ? `<span style="color:#f97316;font-size:11px">💰 $${cost >= 1000 ? (cost/1000).toFixed(0)+'k' : cost.toFixed(0)}</span>` : '';
  const scoreHtml = d.s ? `<span class="score">▲ ${d.s.toLocaleString()}</span>` : '';
  const platform = PLATFORMS[d.p] || d.p;
  const body = (d.b||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const title = (d.t||'(no title)').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const uid = d.i.replace(/[^a-z0-9]/gi,'_');

  return `<div class="item-card">
    <div class="item-header">
      <div class="item-platform">${platform}</div>
      <div class="item-title"><a href="${d.u}" target="_blank" rel="noopener">${title}</a></div>
    </div>
    <div class="item-meta">${scoreHtml} ${taskTag} ${langTag} ${costTag}</div>
    ${body ? `<div class="item-body">${body.slice(0,280)}${body.length>280?'…':''}</div>` : ''}
    <div class="item-detail" id="det-${uid}">
      <pre>${body}</pre>
    </div>
    <button class="btn-ghost" style="margin-top:8px" onclick="toggleDet('${uid}')">展开全文</button>
  </div>`;
}

function toggleDet(uid) {
  document.getElementById('det-'+uid)?.classList.toggle('open');
}

function renderPagination(pages) {
  if (pages <= 1) { document.getElementById('pagination').innerHTML=''; return; }
  let html = '';
  html += `<button class="page-btn" onclick="goPage(${page-1})" ${page<=1?'disabled':''}>← 上页</button>`;
  const lo = Math.max(1,page-3), hi = Math.min(pages,page+3);
  if (lo>1) html += `<button class="page-btn" onclick="goPage(1)">1</button>`;
  if (lo>2) html += `<span style="color:var(--muted);padding:0 4px">…</span>`;
  for (let i=lo;i<=hi;i++) html += `<button class="page-btn${i===page?' active':''}" onclick="goPage(${i})">${i}</button>`;
  if (hi<pages-1) html += `<span style="color:var(--muted);padding:0 4px">…</span>`;
  if (hi<pages) html += `<button class="page-btn" onclick="goPage(${pages})">${pages}</button>`;
  html += `<button class="page-btn" onclick="goPage(${page+1})" ${page>=pages?'disabled':''}>下页 →</button>`;
  document.getElementById('pagination').innerHTML = html;
}

function goPage(p) {
  page = p;
  render();
  window.scrollTo(0, 0);
}

function showView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.querySelectorAll('.sidebar .nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  if (name === 'charts') renderCharts();
}

function renderCharts() {
  const platform={}, task={}, lang={};
  for (const d of allData) {
    platform[d.p] = (platform[d.p]||0)+1;
    task[d.k||'other'] = (task[d.k||'other']||0)+1;
    lang[d.l||'?'] = (lang[d.l||'?']||0)+1;
  }
  renderBarChart('chart-platform', platform);
  renderBarChart('chart-task', task);
  renderBarChart('chart-lang', lang);
}

function renderBarChart(id, data) {
  const sorted = Object.entries(data).sort((a,b)=>b[1]-a[1]);
  const max = sorted[0]?.[1] || 1;
  document.getElementById(id).innerHTML = sorted.map(([k,v]) =>
    `<div class="chart-bar">
      <span class="bar-label">${PLATFORMS[k]||k}</span>
      <div class="bar-fill" style="width:${(v/max*280).toFixed(0)}px"></div>
      <span class="bar-count">${v.toLocaleString()}</span>
      <span style="color:var(--muted);font-size:11px">${(v/allData.length*100).toFixed(1)}%</span>
    </div>`
  ).join('');
}

let currentReportFile = null;
function loadReport(file, btn) {
  document.querySelectorAll('.report-tab').forEach(b=>b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  if (file === currentReportFile) return;
  currentReportFile = file;
  document.getElementById('report-content').innerHTML = '<div class="loading">加载中…</div>';
  fetch(file).then(r=>r.text()).then(md=>{
    document.getElementById('report-content').innerHTML = marked.parse(md);
  }).catch(()=>{
    document.getElementById('report-content').innerHTML = '<p style="color:#f87171">加载失败</p>';
  });
}

// auto-load first report when switching to report view
const origShowView = showView;
function showView(name, btn) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.querySelectorAll('.sidebar > .nav-btn').forEach(b=>b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  if (name==='charts') renderCharts();
  if (name==='report' && !currentReportFile) loadReport('burn.md', document.querySelector('.report-tab'));
}

init();
</script>
</body>
</html>
